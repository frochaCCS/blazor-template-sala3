name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Unit Tests
        id: unit_tests
        continue-on-error: true
        run: |
          dotnet test tests/ITSupportDesk.UnitTests/ \
            --configuration Release --no-build --verbosity normal \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory TestResults/unit

      - name: Install Playwright Browsers
        run: |
          cd tests/ITSupportDesk.E2ETests
          dotnet build
          pwsh bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: E2E Tests
        id: e2e_tests
        continue-on-error: true
        run: |
          dotnet test tests/ITSupportDesk.E2ETests/ \
            --configuration Release --verbosity normal \
            --logger "trx;LogFileName=e2e.trx" \
            --results-directory TestResults/e2e

      - name: Build Test Summary
        if: always() && github.event_name == 'pull_request'
        id: summary
        run: python3 .github/scripts/build_test_summary.py
        env:
          UNIT_TRX: TestResults/unit/unit.trx
          E2E_TRX: TestResults/e2e/e2e.trx
          UNIT_OUTCOME: ${{ steps.unit_tests.outcome }}
          E2E_OUTCOME: ${{ steps.e2e_tests.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Post / Update PR Comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('TestResults/summary.md', 'utf8');
            const marker = '<!-- ci-test-summary -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail if any tests failed
        if: always()
        run: |
          if [ "${{ steps.unit_tests.outcome }}" != "success" ] || [ "${{ steps.e2e_tests.outcome }}" != "success" ]; then
            echo "Unit: ${{ steps.unit_tests.outcome }} | E2E: ${{ steps.e2e_tests.outcome }}"
            exit 1
          fi
